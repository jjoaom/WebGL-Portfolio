<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contatos</title>
  <link rel="stylesheet" href="./contatos.css" />
  <script src="./contato.js" defer></script>
</head>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<body>
  <div class="frame">
    <div class="window">
      <div class="window-inner contact-screen">

        <h1 class="title">
          Lorem ipsum dolor sit
          <span class="title-underline"></span>
        </h1>

        <div class="avatar" aria-hidden="true">
           <div class="avatar">
              <img src="../img/p1-1.jpg" alt="Foto de perfil" />
            </div>
        </div>

        <p class="bio">
          Lorem ipsum dolor sit amet, consectetur adipisicing elit.
        </p>

        <div class="actions">
          <a class="btn btn-whats" href="https://wa.me/55SEUNUMERO" target="_blank" rel="noreferrer">
            <span class="ico"><img src="/img/zap.png" alt="WhatsApp"></span>
            WHATSAPP
          </a>

          <a class="btn btn-linkedin" href="https://www.linkedin.com/in/user" target="_blank" rel="noreferrer">
            <span class="ico">in</span>
            LINKEDIN
          </a>

          <!-- ABRIR MODAL -->
          <button class="btn btn-email" type="button" id="openEmail">
            <span class="ico">✉</span>
            E-MAIL
          </button>
        </div>

      </div>
    </div>
  </div>

  <div class="modal" id="emailModal" aria-hidden="true">
    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-bar">
        <strong class="modal-title" id="modalTitle">Enviar e-mail</strong>

        <button class="modal-close" type="button" id="closeEmail" aria-label="Fechar">✕</button>
      </div>

      <form class="modal-body" id="contactForm">
        <label class="field">
          <span>Seu nome</span>
          <input type="text" name="user_name" required />
        </label>

        <label class="field">
          <span>Seu e-mail</span>
          <input type="email" name="user_email" required />
        </label>

        <label class="field">
          <span>Mensagem</span>
          <textarea name="message" rows="5" required></textarea>
        </label>

        <div class="modal-actions">
          <button class="btn btn-ghost" type="button" id="cancelEmail">Cancelar</button>
          <button class="btn btn-send" type="submit">Enviar</button>
        </div>

        <p class="form-hint" id="formHint" aria-live="polite"></p>
      </form>
    </div>
  </div>
    <!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

</body>
</html>
